name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      resolved-version: ${{ steps.gradle-version.outputs.version }}
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Extract Project Version
        id: gradle-version
        run: |
          BUILD_FLAGS=""
          if [ "${{ github.event_name }}" = "release" ]; then
            BUILD_FLAGS="-Prelease=true"
          fi
          VERSION=$(./gradlew printVersion $BUILD_FLAGS | grep "^VERSION=" | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build plugin
        run: |
          BUILD_FLAGS=""
          if [ "${{ github.event_name }}" = "release" ]; then
            BUILD_FLAGS="-Prelease=true"
          fi
          ./gradlew build $BUILD_FLAGS

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: build/libs/*.jar
          archive: false

  publish:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          path: build/libs

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: build/libs/*.jar
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || 'beta' }}
          name: ${{ github.event_name == 'release' && github.event.release.name || 'Beta Build' }}
          body: ${{ github.event_name == 'release' && github.event.release.body || github.event.head_commit.message }}
          prerelease: ${{ github.event_name != 'release' }}
          force_update_files: true

      - name: Publish to Modrinth & Hangar
        uses: HSGamer/action-mcreleaser@main
        with:
          files: build/libs/*.jar
          platforms: modrinth,hangar
        env:
          NAME: ${{ needs.build.outputs.resolved-version }}
          VERSION: ${{ needs.build.outputs.resolved-version }}
          DESCRIPTION: ${{ github.event.release.body || github.event.head_commit.message }}
          GAME_VERSIONS: "1.21 1.21.1 1.21.2 1.21.3 1.21.4 1.21.5 1.21.6 1.21.7 1.21.8 1.21.9 1.21.10 1.21.11 26.1 26.1.1 26.1.2"
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT: Vm3UrNy9
          MODRINTH_LOADERS: "paper purpur folia"
          MODRINTH_VERSION_TYPE: ${{ github.event_name == 'release' && 'release' || 'beta' }}
          HANGAR_KEY: ${{ secrets.HANGAR_KEY }}
          HANGAR_PROJECT: vessel
          HANGAR_PLATFORM: PAPER
          HANGAR_CHANNEL: ${{ github.event_name == 'release' && 'Release' || 'Beta' }}